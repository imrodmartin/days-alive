<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Alive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 3rem;
    }

    input[type="date"] {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      color-scheme: dark;
    }

    input[type="date"]:focus {
      border-color: #555;
    }

    button {
      background: #fff;
      border: none;
      border-radius: 8px;
      color: #000;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.65rem 1.5rem;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .result {
      display: none;
    }

    .result.visible {
      display: block;
    }

    .days-number {
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .days-label {
      font-size: 1.1rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: #222;
      border-radius: 12px;
      overflow: hidden;
    }

    .stat {
      background: #111;
      padding: 1.25rem 0.75rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .error {
      color: #e55;
      font-size: 0.9rem;
      margin-top: -1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Days Alive</h1>

    <div class="input-row">
      <input type="date" id="dob" />
      <button onclick="calculate()">Calculate</button>
    </div>

    <p class="error" id="error">Please enter a valid birthdate.</p>

    <div class="result" id="result">
      <div class="days-number" id="days-number"></div>
      <div class="days-label">days alive</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="years"></div>
          <div class="stat-label">Years</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="months"></div>
          <div class="stat-label">Months</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="hours"></div>
          <div class="stat-label">Hours</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function calculate() {
      const dobInput = document.getElementById('dob');
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');

      const dob = new Date(dobInput.value);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      errorEl.classList.remove('visible');
      resultEl.classList.remove('visible');

      if (!dobInput.value || isNaN(dob.getTime()) || dob >= today) {
        errorEl.classList.add('visible');
        return;
      }

      const msPerDay = 1000 * 60 * 60 * 24;
      const days = Math.floor((today - dob) / msPerDay);

      const years = Math.floor(days / 365.25);
      const months = Math.floor(days / 30.44);
      const hours = days * 24;

      document.getElementById('days-number').textContent = days.toLocaleString();
      document.getElementById('years').textContent = years.toLocaleString();
      document.getElementById('months').textContent = months.toLocaleString();
      document.getElementById('hours').textContent = hours.toLocaleString();

      resultEl.classList.add('visible');
    }

    document.getElementById('dob').addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>
</body>
</html>
